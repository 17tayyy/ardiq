name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 1s
          --health-timeout 3s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync (builds the Rust extension + dev deps)
        run: uv sync --dev
      - name: Lint
        run: uv run ruff check .
      - name: Type-check
        run: uv run ty check ardiq tests
      - name: Test
        run: uv run pytest -q
